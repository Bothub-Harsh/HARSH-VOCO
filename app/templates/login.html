<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Harsh Vocabulary Intelligence System</title>
  <style>
    body {font-family: Inter, Arial, sans-serif; margin:0; background:#0b1020; color:#e6ebff; display:grid; place-items:center; min-height:100vh;}
    .card {width:min(420px, 92vw); background:#151c33; padding:2rem; border-radius:16px; box-shadow:0 16px 40px rgba(0,0,0,.35);}
    h1 {font-size:1.5rem; margin:0 0 1rem;}
    input, button {width:100%; border-radius:10px; border:1px solid #2a355f; padding:.75rem; margin:.5rem 0; background:#0f1530; color:#fff;}
    button {background:linear-gradient(120deg,#6b7cff,#4dffc8); color:#0b1020; font-weight:700; cursor:pointer;}
    a {color:#8eb3ff;}
    .msg {min-height:1.2rem; color:#ff8f8f;}
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome Back</h1>
    <p>Sign in to continue your vocabulary journey.</p>
    <input id="username" placeholder="Username" />
    <input id="password" placeholder="Password" type="password" />
    <button id="loginBtn">Login</button>
    <div class="msg" id="msg"></div>
    <p>New here? <a href="/signup">Create account</a></p>
  </div>
  <script>
    const BASE_URL = '';

    async function handleLogin() {
      const msg = document.getElementById('msg');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        msg.textContent = 'Please enter username and password';
        return;
      }

      try {
        const res = await fetch(`${BASE_URL}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        let data = {};
        let rawError = '';
        try {
          data = await res.json();
        } catch (_) {
          try {
            rawError = await res.text();
          } catch (_) {
            rawError = '';
          }
          data = {};
        }

        if (!res.ok) {
          msg.textContent = data.detail || rawError || `Login failed (HTTP ${res.status})`;
          return;
        }

        if (!data.access_token) {
          msg.textContent = 'Login failed: missing token';
          return;
        }

        localStorage.setItem('token', data.access_token);
        localStorage.setItem('username', data.username || username);
        window.location.assign(`${BASE_URL}/dashboard`);
      } catch (_) {
        msg.textContent = 'Unable to connect. Please try again.';
      }
    }

    document.getElementById('loginBtn').addEventListener('click', handleLogin);
    document.getElementById('password').addEventListener('keydown', (event) => {
      if (event.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
